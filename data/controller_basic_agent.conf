# Baseline controller configuration using the current CARLA BasicAgent PID logic.
controller_mode: basic_agent
controller_name: basic_agent
target_speed: 20
metrics_dir: artifacts/metrics/pid
metrics_run_label: pid
front_vehicle_min_hold_distance: 2.3
front_vehicle_reaction_time_s: 0.20
front_vehicle_comfort_decel_mps2: 4.5
front_vehicle_low_speed_mps: 0.75
front_vehicle_restart_speed_mps: 1.2
front_vehicle_ttc_brake_s: 2.2
front_vehicle_ttc_emergency_s: 1.0
rear_approach_ttc_threshold_s: 4.5
rear_approach_close_distance: 7.5
rear_lane_hold_distance: 8.0
rear_lane_release_distance: 4.5
rear_lane_release_velocity_mps: 0.10
rear_lane_release_closing_speed_mps: 0.35
rear_lane_release_ttc_s: 6.0
